<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Banner produs — Învață AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1600px;height:1200px;overflow:hidden}
  body{
    font-family:'Inter',sans-serif;color:#fff;
    background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 100%);
    display:flex;flex-direction:column;justify-content:center;
    padding:120px 130px;position:relative;
  }
  /* subtle glow accent */
  .glow{position:absolute;top:-200px;right:-150px;width:700px;height:700px;border-radius:50%;
    background:radial-gradient(circle,rgba(124,58,237,0.35) 0%,rgba(124,58,237,0) 70%);}
  .glow2{position:absolute;bottom:-250px;left:-200px;width:800px;height:800px;border-radius:50%;
    background:radial-gradient(circle,rgba(37,99,235,0.25) 0%,rgba(37,99,235,0) 70%);}

  .logo{font-size:64px;font-weight:900;letter-spacing:-2px;margin-bottom:90px;position:relative}
  .logo span{background:linear-gradient(120deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .logo .spark{color:#a78bfa;font-size:44px;vertical-align:top;margin-left:6px}

  .eyebrow{font-size:26px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:#93c5fd;margin-bottom:36px;position:relative}
  h1{font-size:104px;font-weight:900;line-height:1.08;letter-spacing:-4px;margin-bottom:44px;max-width:1250px;position:relative}
  h1 em{font-style:normal;background:linear-gradient(120deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:38px;line-height:1.55;color:#cbd5e1;max-width:1150px;margin-bottom:90px;position:relative}

  .meta{display:flex;gap:110px;border-top:2px solid rgba(255,255,255,0.15);padding-top:56px;position:relative}
  .meta strong{display:block;font-size:58px;font-weight:900;color:#fff;margin-bottom:8px}
  .meta span{font-size:24px;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;font-weight:600}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="logo">Învață <span>AI</span><span class="spark">✦</span></div>

  <div class="eyebrow">Curs online · 100% în limba română</div>

  <h1>Folosește AI-ul ca un <em>profesionist</em></h1>

  <p class="sub">Prompturi eficiente, context, workflow-uri și automatizări pe care le aplici direct în munca ta de zi cu zi. Pas cu pas, fără jargon.</p>

  <div class="meta">
    <div><strong>40</strong><span>Lecții practice</span></div>
    <div><strong>∞</strong><span>Acces pe viață</span></div>
    <div><strong>14 zile</strong><span>Garanție</span></div>
  </div>
</body>
</html>
