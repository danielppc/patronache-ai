<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>OG image — Învață AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:'Inter',sans-serif;color:#fff;
    background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 100%);
    display:flex;flex-direction:column;justify-content:center;
    padding:70px 90px;position:relative;
  }
  .glow{position:absolute;top:-180px;right:-120px;width:520px;height:520px;border-radius:50%;
    background:radial-gradient(circle,rgba(124,58,237,0.35) 0%,rgba(124,58,237,0) 70%);}
  .logo{font-size:42px;font-weight:900;letter-spacing:-1.5px;margin-bottom:48px;position:relative}
  .logo span{background:linear-gradient(120deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .logo .spark{color:#a78bfa;font-size:30px;vertical-align:top;margin-left:5px}
  h1{font-size:66px;font-weight:900;line-height:1.1;letter-spacing:-2.5px;margin-bottom:28px;max-width:960px;position:relative}
  h1 em{font-style:normal;background:linear-gradient(120deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:27px;line-height:1.5;color:#cbd5e1;max-width:880px;margin-bottom:52px;position:relative}
  .meta{display:flex;gap:64px;border-top:2px solid rgba(255,255,255,0.15);padding-top:32px;position:relative}
  .meta strong{display:block;font-size:34px;font-weight:900;color:#fff;margin-bottom:4px}
  .meta span{font-size:16px;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="logo">Învață <span>AI</span><span class="spark">✦</span></div>
  <h1>Folosește AI-ul ca un <em>profesionist</em></h1>
  <p class="sub">Curs online în limba română: prompturi, context, workflow-uri și automatizări pentru munca reală.</p>
  <div class="meta">
    <div><strong>40</strong><span>Lecții practice</span></div>
    <div><strong>∞</strong><span>Acces pe viață</span></div>
    <div><strong>14 zile</strong><span>Garanție</span></div>
  </div>
</body>
</html>
