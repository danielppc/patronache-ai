<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina nu există — Învață AI</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; color: #1e293b; padding: 2rem; text-align: center; }
    .code { font-size: 5rem; font-weight: 900; letter-spacing: -3px; background: linear-gradient(120deg, #2563eb, #7c3aed); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
    h1 { font-size: 1.5rem; font-weight: 900; color: #0f172a; margin-bottom: 0.75rem; }
    p { color: #64748b; margin-bottom: 2rem; max-width: 420px; margin-left: auto; margin-right: auto; }
    .btns { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    a.btn { background: #1e40af; color: #fff; text-decoration: none; font-weight: 700; padding: 0.85rem 1.75rem; border-radius: 9px; font-size: 0.95rem; }
    a.ghost { background: transparent; color: #1e40af; border: 1.5px solid #1e40af; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Pagina asta nu există</h1>
    <p>Linkul e greșit sau pagina a fost mutată. Nimic pierdut — ia-o de la început sau citește ceva util pe blog.</p>
    <div class="btns">
      <a class="btn" href="/">Pagina principală</a>
      <a class="btn ghost" href="/blog/">Blog</a>
    </div>
  </div>
</body>
</html>
